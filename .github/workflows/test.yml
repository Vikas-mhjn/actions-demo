name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Step 1 - Download the repository code
        uses: actions/checkout@v4

      - name: Step 2 - Install Node.jobs
        uses: actions/setup-node@v4
        with: 
          node-version: '20'

      - name: Step 3 - Install project dependecies
        run: npm install

      - name: Step 4 - Run the Tests
        run: npm test